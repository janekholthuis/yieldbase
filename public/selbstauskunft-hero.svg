<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="440" viewBox="0 0 1600 440" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Klassische Wohnhausfassade">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f1ea"/>
      <stop offset="0.55" stop-color="#ece7dd"/>
      <stop offset="1" stop-color="#e2dbcf"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.82" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.9"/>
    </linearGradient>
    <!-- One facade bay: tall arched window + slim balcony railing. Thin warm-grey
         strokes, no fill, so the light "sky" reads as a white building. -->
    <pattern id="facade" width="150" height="230" patternUnits="userSpaceOnUse">
      <g fill="none" stroke="#c3b6a1" stroke-width="2.4" stroke-opacity="0.6">
        <path d="M45 30 h60 v96 a30 30 0 0 1 -60 0 z"/>
        <line x1="75" y1="30" x2="75" y2="126"/>
        <line x1="45" y1="70" x2="105" y2="70"/>
      </g>
      <g fill="none" stroke="#bcae97" stroke-width="2.2" stroke-opacity="0.5">
        <line x1="30" y1="150" x2="120" y2="150"/>
        <line x1="30" y1="176" x2="120" y2="176"/>
        <line x1="38" y1="150" x2="38" y2="176"/>
        <line x1="54" y1="150" x2="54" y2="176"/>
        <line x1="70" y1="150" x2="70" y2="176"/>
        <line x1="86" y1="150" x2="86" y2="176"/>
        <line x1="102" y1="150" x2="102" y2="176"/>
        <line x1="118" y1="150" x2="118" y2="176"/>
      </g>
    </pattern>
    <linearGradient id="vignette" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d8cfbf" stop-opacity="0.35"/>
      <stop offset="0.2" stop-color="#d8cfbf" stop-opacity="0"/>
      <stop offset="0.8" stop-color="#d8cfbf" stop-opacity="0"/>
      <stop offset="1" stop-color="#d8cfbf" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="440" fill="url(#sky)"/>
  <rect x="0" y="70" width="1600" height="370" fill="url(#facade)"/>
  <rect width="1600" height="440" fill="url(#vignette)"/>
  <line x1="0" y1="72" x2="1600" y2="72" stroke="#c3b6a1" stroke-width="3" stroke-opacity="0.55"/>
  <rect width="1600" height="440" fill="url(#fade)"/>
</svg>
